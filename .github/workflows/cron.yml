name: Update-Configs
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - run: pip install requests
      - run: python sweeper.py
      - name: Commit and Push
        run: |
          git config --global user.name "Officer-MmD-Bot"
          git config --global user.email "bot@github.com"
          git add data.txt
          # اگه تغییری نبود هم یه کامیت فیک می‌زنیم که سیستم آپدیت شه
          git commit -m "Auto-update: $(date)" || git commit --allow-empty -m "Heartbeat update"
          git push
          
