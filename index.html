<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ویترین MAMAD</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        #app { width: 100%; max-width: 420px; padding: 15px; }
        .main-title { text-align: center; font-size: 55px; font-weight: 900; color: #fff; text-shadow: 0 0 10px #00f3ff, 0 0 20px #7000ff; margin: 30px 0; letter-spacing: 10px; }
        .card { background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 25px; padding: 20px; margin-bottom: 25px; border-bottom: 4px solid #00f3ff; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .num { font-size: 32px; font-weight: 900; color: #00f3ff; }
        .btn-copy { background: #00f3ff; border: none; color: #000; padding: 12px 28px; border-radius: 15px; font-weight: bold; cursor: pointer; }
        .txt-area { background: #050505; border: 1px solid #333; color: #00f3ff; padding: 15px; font-family: monospace; font-size: 11px; border-radius: 12px; word-break: break-all; margin-bottom: 15px; direction: ltr; text-align: left; line-height: 1.6; min-height: 40px; }
        .footer-id { text-align: center; font-size: 18px; font-weight: bold; border-top: 1px solid #222; padding-top: 12px; min-height: 40px; }
        .desc-text { color: #e0ddd5; text-align: center; font-size: 13px; margin-top: 25px; line-height: 1.8; }
        .warning-text { color: #ffff00; text-align: center; font-size: 13px; margin: 20px 10px; line-height: 1.8; border: 1px solid #ffff0044; padding: 12px; border-radius: 15px; background: rgba(255, 255, 0, 0.05); }
        .final-gold { text-align: center; margin: 20px 0 50px 0; font-size: 20px; color: #ffcc00; font-weight: bold; direction: ltr !important; }
        #loading { text-align: center; color: #00f3ff; margin: 20px; font-size: 14px; }
    </style>
</head>
<body>

    <div id="app">
        <div class="main-title">MAMAD</div>
        
        <div id="loading">در حال بارگیری کانفیگ‌ها... ⏳</div>
        <div id="configs-list"></div>
